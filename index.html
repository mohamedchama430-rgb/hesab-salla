<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="حساب الصالة" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#15181A" />
<title>حساب الصالة</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Tajawal:wght@400;500;700&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #15181A;
    --panel: #1E2225;
    --panelAlt: #20262A;
    --border: #31373C;
    --borderSoft: #282E32;
    --text: #ECEDEE;
    --textDim: #8B939A;
    --amber: #D7FF4B;
    --teal: #2BE0A6;
    --red: #C6564F;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Tajawal', 'Segoe UI', Tahoma, Geneva, Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  .mono { font-family: 'Roboto Mono', 'Courier New', monospace; }
  h1, h3, .display-font, .worker-tab, .empty p.title, .note-author {
    font-family: 'Cairo', 'Tajawal', sans-serif;
  }
  input::placeholder { color: var(--textDim); opacity: 0.6; }
  button { cursor: pointer; -webkit-appearance: none; appearance: none; }
  input, button, select { font-family: inherit; }

  #app { height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

  /* header */
  .header {
    flex-shrink: 0;
    padding: 14px 16px 12px;
    background: repeating-linear-gradient(135deg, var(--panel) 0px, var(--panel) 2px, var(--bg) 2px, var(--bg) 4px);
    border-bottom: 1px solid var(--border);
  }
  .header-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
  .header h1 { font-size: 21px; font-weight: 900; margin: 0; letter-spacing: -0.4px; white-space: nowrap; }
  .header .sub { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; color: var(--amber); margin: 3px 0 0; }
  .header .sub::before { content: ""; width: 14px; height: 3px; border-radius: 3px; background: var(--amber); display: inline-block; }
  .header-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  .add-btn, .icon-btn {
    width: 44px; height: 44px; border-radius: 999px;
    background: var(--amber); color: #141B05; border: none;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    animation: pulseGlow 2.4s ease-in-out infinite;
  }
  .icon-btn.ghost {
    background: var(--panelAlt); color: var(--text); border: 1px solid var(--border);
    animation: none;
  }
  .icon-btn.ghost.active-toggle { background: rgba(215,255,75,0.14); color: var(--amber); border-color: var(--amber); }
  .icon-btn { position: relative; }
  .notif-dot {
    position: absolute; top: 4px; right: 4px; width: 10px; height: 10px; border-radius: 999px;
    background: var(--red); border: 2px solid var(--bg);
  }
  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(215,255,75,0.35); }
    50% { box-shadow: 0 0 0 6px rgba(232,163,61,0); }
  }
  .slide-up { animation: slideUp 0.18s ease-out; }
  @keyframes slideUp {
    from { transform: translateY(8px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .add-row { display: none; align-items: center; gap: 8px; margin-top: 12px; }
  .add-row.open { display: flex; }
  .add-row input {
    flex: 1; border-radius: 10px; padding: 10px 12px; font-size: 16px; font-weight: 600;
    background: var(--panelAlt); border: 1px solid var(--amber); color: var(--text); outline: none;
  }
  .add-row .confirm-btn {
    width: 40px; height: 40px; border-radius: 10px; background: var(--teal); color: #04211C;
    border: none; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }

  /* worker tabs */
  .worker-tabs { display: flex; gap: 6px; margin-top: 11px; overflow-x: auto; }
  .worker-tab {
    flex-shrink: 0; padding: 7px 14px; border-radius: 999px; font-size: 13px; font-weight: 700;
    background: var(--panelAlt); border: 1px solid var(--border); color: var(--textDim);
  }
  .worker-tab.active { background: var(--amber); color: #141B05; border-color: var(--amber); }
  .worker-tab.disabled { opacity: 0.4; }
  .ro-banner {
    display: flex; align-items: center; gap: 6px; margin: 12px 16px 0; padding: 8px 12px;
    border-radius: 10px; background: rgba(215,255,75,0.12); border: 1px solid rgba(215,255,75,0.3);
    color: var(--amber); font-size: 12px; font-weight: 700;
  }

  /* main view switcher (calculator / products) */
  .view-tabs { display: flex; gap: 8px; margin-top: 12px; }
  .view-tab {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 7px;
    padding: 11px 10px; border-radius: 12px; font-size: 14px; font-weight: 800;
    background: var(--panelAlt); border: 1px solid var(--border); color: var(--textDim);
  }
  .view-tab.active { background: var(--amber); color: #141B05; border-color: var(--amber); }

  /* product list */
  .list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; min-height: 0; padding: 16px; }
  .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 64px 24px; }
  .empty-circle {
    width: 56px; height: 56px; border-radius: 999px; border: 2px dashed var(--border);
    display: flex; align-items: center; justify-content: center; margin-bottom: 12px; color: var(--textDim);
  }
  .empty p.title { font-weight: 700; color: var(--text); margin: 0; }
  .empty p.sub { font-size: 14px; color: var(--textDim); margin: 4px 0 0; }

  .card {
    position: relative; border-radius: 14px; padding: 12px; margin-bottom: 12px;
    background: var(--panel); border: 1px solid var(--border);
  }
  .card .rivet { position: absolute; width: 6px; height: 6px; border-radius: 999px; top: 6px; background: var(--borderSoft); }
  .card .rivet.r { right: 6px; } .card .rivet.l { left: 6px; }
  .card-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 12px; padding: 0 4px; }
  .card-top h3 { flex: 1; min-width: 0; font-size: 16px; font-weight: 700; margin: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-inline-end: 4px; }
  .card-sum {
    flex-shrink: 0; display: flex; align-items: center; gap: 5px;
    padding: 6px 12px; border-radius: 999px; background: var(--panelAlt); border: 1px solid var(--border);
    font-size: 12px; font-weight: 600; color: var(--textDim); white-space: nowrap;
  }
  .card-sum b { font-size: 14px; font-weight: 800; color: var(--amber); direction: ltr; }
  .del-btn { background: none; border: none; color: var(--textDim); padding: 6px; border-radius: 8px; display: flex; }
  .confirm-del { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .confirm-del .yes {
    display: flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 700;
    padding: 4px 8px; border-radius: 8px; background: var(--red); color: #fff; border: none;
  }
  .confirm-del .no { padding: 4px; border-radius: 8px; background: var(--panelAlt); color: var(--textDim); border: none; display: flex; }

  .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .field-label { font-size: 12px; font-weight: 600; color: var(--textDim); margin-bottom: 4px; padding: 0 4px; }

  /* compact single-row card */
  .card.card-row { display: flex; align-items: center; gap: 8px; padding: 10px 12px; -webkit-touch-callout: none; }
  .card.card-row.dragging {
    z-index: 40; position: relative; box-shadow: 0 10px 26px rgba(0,0,0,0.55);
    background: var(--panelAlt); opacity: 0.98; cursor: grabbing;
  }
  .card-name { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; gap: 2px; -webkit-user-select: none; user-select: none; }
  .card-name h3 { font-size: 14px; font-weight: 700; margin: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-sum-mini { font-size: 11px; font-weight: 700; color: var(--amber); direction: ltr; text-align: right; white-space: nowrap; }
  .mini-field { flex-shrink: 0; width: 58px; display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .mini-field .field-label { font-size: 10px; font-weight: 600; margin: 0; padding: 0; text-align: center; }
  .mini-field .value-field { width: 100%; padding: 6px 2px; font-size: 15px; text-align: center; border-radius: 8px; }
  .card-row .del-btn { flex-shrink: 0; padding: 4px; }
  .card-row .confirm-del { flex-shrink: 0; gap: 3px; }
  .card-row .confirm-del .yes { padding: 5px 6px; }
  .value-field {
    width: 100%; text-align: left; border-radius: 10px; padding: 8px 12px; font-size: 17px; font-weight: 700;
    background: var(--panelAlt); border: 1px solid var(--border); color: var(--textDim); outline: none;
    direction: ltr;
  }
  .value-field.filled { color: var(--amber); }
  .value-field:focus { border-color: var(--amber); }
  .value-field.ro { pointer-events: none; opacity: 0.7; }

  /* history */
  .history { display: none; padding: 12px 16px 8px; background: var(--panel); border: 1px solid var(--border); border-radius: 16px; margin-top: 12px; }
  .history.open { display: block; }
  .history-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .history-top span { font-size: 12px; font-weight: 700; color: var(--textDim); }
  .clear-btn { display: flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600; color: var(--red); background: none; border: none; }
  .history-empty { font-size: 14px; text-align: center; padding: 16px 0; color: var(--textDim); }
  .history-item {
    width: 100%; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 4px 8px;
    padding: 8px; border-radius: 8px; background: none; border: none; border-bottom: 1px solid var(--borderSoft);
    text-align: left;
  }
  .history-item .expr {
    font-size: 14px; color: var(--textDim); direction: ltr;
    flex: 1 1 auto; min-width: 0; overflow-wrap: anywhere; word-break: break-all; white-space: normal;
  }
  .history-item .res { font-size: 14px; font-weight: 700; color: var(--amber); direction: ltr; flex-shrink: 0; }

  /* calculator — Samsung Calculator style, in the app's own palette */
  .calc-page { padding: 0 16px 16px; display: flex; flex-direction: column; flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .calc-wrap { background: var(--bg); flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 10px 14px calc(10px + env(safe-area-inset-bottom, 0px)); }
  .calc-box { border-radius: 22px; padding: 14px 14px 10px; background: #0F1113; border: 1px solid var(--border); box-shadow: inset 0 2px 6px rgba(0,0,0,0.5); }
  .calc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .calc-top span { font-size: 13px; font-weight: 700; color: var(--textDim); }
  .calc-tools-row { display: flex; align-items: center; justify-content: space-between; padding: 0 2px; margin: 0 0 2px; }
  .hist-toggle { display: flex; align-items: center; gap: 4px; font-size: 13px; font-weight: 700; padding: 7px 12px; border-radius: 10px; background: none; border: none; color: var(--textDim); }
  .hist-toggle.active { color: var(--amber); background: rgba(215,255,75,0.12); }
  .calc-back-mini {
    width: 34px; height: 34px; border-radius: 999px; background: none; border: none;
    color: var(--textDim); display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .calc-back-mini:active { background: var(--panelAlt); color: var(--text); }

  /* expression trail (small, like Samsung's history line above the result) — wraps + auto-shrinks instead of clipping */
  .calc-row { padding: 0 2px; min-height: 22px; max-height: 60px; overflow: hidden; }
  .calc-row textarea.calc-expr {
    display: block; width: 100%; height: 60px; border: none; background: none; outline: none;
    resize: none; overflow: hidden; padding: 0; margin: 0;
    font-size: 22px; font-weight: 600; text-align: right; direction: ltr;
    color: var(--textDim); letter-spacing: 0.2px; line-height: 1.25;
    white-space: pre-wrap; word-break: break-all;
  }
  /* result readout — two states, like Samsung: a small dim preview that sits right under
     the expression while typing, and a big colored number once "=" is pressed. */
  .calc-display {
    text-align: right; direction: ltr; overflow: hidden; white-space: pre-wrap; word-break: break-all;
  }
  .calc-display.preview { font-weight: 700; color: var(--textDim); margin: 2px 2px 4px; height: 32px; line-height: 1.2; }
  .calc-display.final { font-weight: 800; color: var(--amber); margin: 14px 2px 6px; height: 88px; line-height: 1.15; }
  .calc-box-merged { padding-bottom: 12px; }
  .calc-pad-divider { height: 1px; background: var(--border); opacity: 0.6; margin: 2px 0 10px; }

  .sq-btn { width: 54px; height: 54px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: none; }
  .sq-btn.clear { background: var(--panelAlt); color: var(--textDim); border: 1px solid var(--border); }
  .sq-btn.equals { background: var(--amber); color: #141B05; font-weight: 700; font-size: 22px; }

  /* shared circular back button (notes / history / admin pages) */
  .helper-back-btn {
    width: 44px; height: 44px; border-radius: 999px;
    background: var(--panelAlt); color: var(--text); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }

  /* custom keypad — circular Samsung Calculator buttons */
  .keypad-wrap {
    flex-shrink: 0; z-index: 50;
    padding: 8px 16px calc(12px + env(safe-area-inset-bottom, 0px));
    background: var(--bg); border-top: 1px solid var(--border);
    box-shadow: 0 -6px 20px rgba(0,0,0,0.45);
  }
  .keypad-box { border-radius: 18px; padding: 8px 8px; background: #0F1113; border: 1px solid var(--border); }
  .keypad-top { display: flex; align-items: center; justify-content: space-between; padding: 2px 4px 6px; }
  .keypad-top span { font-size: 11px; font-weight: 600; color: var(--textDim); }
  .keypad-top-actions { display: flex; align-items: center; gap: 6px; }
  .keypad-back { width: 32px; height: 32px; border-radius: 999px; background: none; border: none; color: var(--textDim); display: flex; align-items: center; justify-content: center; }
  .keypad-back:active { background: var(--panelAlt); }
  .keypad-done { display: flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 700; padding: 5px 10px; border-radius: 8px; background: var(--teal); color: #04211C; border: none; }
  .keypad-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; direction: ltr; }
  .kp-btn {
    width: 100%; max-width: 58px; aspect-ratio: 1 / 1; border-radius: 999px; border: none; background: none;
    color: var(--text); font-size: 18px; font-weight: 700; display: flex; align-items: center; justify-content: center;
    margin: 0 auto;
  }
  /* digits: soft filled circle */
  .kp-btn.kp-digit { background: var(--panelAlt); color: var(--text); }
  .kp-btn.kp-digit:active { background: var(--border); }
  /* functions ( ) % : plain, dim */
  .kp-btn.kp-fn { background: var(--panelAlt); color: var(--textDim); font-size: 15px; font-weight: 700; }
  .kp-btn.kp-fn:active { background: var(--border); }
  /* AC : filled circle, red like Samsung's clear */
  .kp-btn.kp-clear { background: var(--panelAlt); color: var(--red); font-size: 14px; font-weight: 800; }
  .kp-btn.kp-clear:active { background: var(--border); }
  /* +/- toggle sign */
  .kp-btn.kp-sign { background: var(--panelAlt); color: var(--textDim); font-size: 15px; font-weight: 700; }
  .kp-btn.kp-sign:active { background: var(--border); }
  /* operators: filled amber circle, like Samsung's orange */
  .kp-btn.kp-op { background: rgba(215,255,75,0.14); color: var(--amber); font-size: 19px; }
  .kp-btn.kp-op:active { background: rgba(215,255,75,0.24); }
  /* equals: same circular shape/size as every other key, just accent-colored (Samsung style) */
  .kp-btn.kp-equals {
    background: var(--amber); color: #141B05; font-size: 20px; font-weight: 800;
  }
  .kp-btn.kp-equals:active { filter: brightness(0.92); }

  /* auth screen */
  .auth-wrap { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 24px; }
  .auth-box { max-width: 360px; margin: 0 auto; width: 100%; }
  .auth-box h1 { font-size: 22px; font-weight: 800; text-align: center; margin: 0 0 4px; }
  .auth-box .sub { font-size: 13px; color: var(--textDim); text-align: center; margin: 0 0 28px; }
  .auth-field { margin-bottom: 14px; }
  .auth-field label { display: block; font-size: 13px; font-weight: 600; color: var(--textDim); margin-bottom: 6px; }
  .auth-field select, .auth-field input {
    width: 100%; padding: 12px 14px; border-radius: 10px; font-size: 16px;
    background: var(--panelAlt); border: 1px solid var(--border); color: var(--text); outline: none;
  }
  .auth-field select:focus, .auth-field input:focus { border-color: var(--amber); }
  .auth-submit {
    width: 100%; padding: 13px; border-radius: 12px; font-weight: 800; font-size: 15px;
    background: var(--amber); color: #141B05; border: none; margin-top: 6px;
  }
  .auth-submit:disabled { opacity: 0.6; }
  .auth-error { color: var(--red); font-size: 13px; text-align: center; margin-top: 12px; font-weight: 600; }
  .auth-loading { text-align: center; color: var(--textDim); padding: 40px; }

  /* notes page */
  .notes-list { padding: 0 16px; }
  .note-card { display: flex; align-items: flex-start; gap: 10px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 10px; }
  .note-body { flex: 1; min-width: 0; }
  .note-check {
    flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%; margin-top: 2px;
    border: 2px solid var(--border); background: none; color: var(--bg);
    display: flex; align-items: center; justify-content: center; padding: 0;
  }
  .note-done .note-check { background: var(--amber); border-color: var(--amber); }
  .note-done .note-text { color: var(--textDim); text-decoration: line-through; }
  .note-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .note-author { font-size: 12px; font-weight: 800; color: var(--amber); }
  .note-time { font-size: 11px; color: var(--textDim); }
  .note-text { font-size: 15px; line-height: 1.5; color: var(--text); white-space: pre-wrap; word-break: break-word; }
  .note-compose { padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px)); background: var(--bg); border-top: 1px solid var(--border); }
  .note-compose-row { display: flex; align-items: flex-end; gap: 8px; }
  .note-compose textarea {
    flex: 1; border-radius: 12px; padding: 10px 12px; font-size: 15px; resize: none;
    background: var(--panelAlt); border: 1px solid var(--border); color: var(--text); outline: none;
    max-height: 100px; font-family: inherit;
  }
  .note-compose textarea:focus { border-color: var(--amber); }
  .note-send-btn {
    width: 44px; height: 44px; border-radius: 999px; background: var(--teal); color: #04211C;
    border: none; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .note-send-btn:disabled { opacity: 0.4; }
  .note-photo-btn {
    width: 44px; height: 44px; border-radius: 999px; background: var(--panel); color: var(--textDim);
    border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .note-photo-preview { position: relative; display: inline-block; margin-bottom: 8px; }
  .note-photo-preview img { max-height: 90px; border-radius: 10px; display: block; }
  .note-photo-loading { font-size: 13px; color: var(--textDim); padding: 8px 0; }
  .note-photo-remove {
    position: absolute; top: -6px; right: -6px; width: 22px; height: 22px; border-radius: 50%;
    background: var(--red); color: #fff; border: none; display: flex; align-items: center; justify-content: center; padding: 0;
  }
  .note-photo { max-width: 100%; border-radius: 10px; margin: 6px 0; display: block; }
  .note-del-btn { margin-top: 4px; }
  .note-confirm-del { margin-top: 4px; }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

(function () {
  "use strict";

  // ==========================================================================
  // إعدادات Supabase - بدّل هاد المعطيات بلي غادي تاخد من Supabase Dashboard

  var SUPABASE_ANON_KEY = "sb_publishable_ZhwzJGgN0tqLfI0wf91XBw_uo3OKKWD";
  var SUPABASE_BUCKET = "note-photos";
  // اسم الـEdge Function لي كتدير عمليات admin (زيادة/تعطيل خدام) - شوف supabase/functions/admin-manage-worker
  var ADMIN_FN_NAME = "admin-manage-worker";

  // ---------- helper: نبعثو عملية admin للـEdge Function ----------
  function callAdminFn(payload) {
    return supabaseClient.functions.invoke(ADMIN_FN_NAME, { body: payload }).then(function (res) {
      if (res.error) throw res.error;
      if (res.data && res.data.error) throw new Error(res.data.error);
      return res.data;
    });
  }

  // ---------- helpers ----------
  function arabicToWesternDigits(str) {
    var map = { "٠":"0","١":"1","٢":"2","٣":"3","٤":"4","٥":"5","٦":"6","٧":"7","٨":"8","٩":"9" };
    return str.replace(/[٠-٩]/g, function (d) { return map[d]; });
  }
  function evaluateExpr(raw) {
    if (raw === null || raw === undefined) return null;
    var s = String(raw).trim();
    if (!s) return null;
    s = arabicToWesternDigits(s);
    s = s.replace(/×/g, "*").replace(/[xX]/g, "*").replace(/÷/g, "/").replace(/,/g, ".");
    s = s.replace(/=$/, "");
    s = s.replace(/(\d+(\.\d+)?)%/g, "($1/100)");
    if (!/^[0-9+\-*/().\s]+$/.test(s)) return null;
    if (!/[0-9]/.test(s)) return null;
    try {
      var result = Function('"use strict"; return (' + s + ")")();
      if (typeof result !== "number" || !isFinite(result)) return null;
      return Math.round(result * 100) / 100;
    } catch (e) {
      return null;
    }
  }
  function formatNumber(n) {
    return formatNumberPlain(n, true);
  }
  function formatNumberPlain(n, withCurrency) {
    if (n === null || n === undefined || n === "") return "";
    var num = typeof n === "number" ? n : parseFloat(n);
    if (isNaN(num)) return String(n);
    var out = Number.isInteger(num)
      ? num.toLocaleString("en-US")
      : num.toLocaleString("en-US", { maximumFractionDigits: 2 });
    return withCurrency ? out + " DH" : out;
  }
  // prevents "5+++5" — if the last character already typed is an operator, tapping
  // another operator replaces it instead of stacking a new one after it.
  var CALC_OPERATORS = ["+", "-", "×", "÷"];
  function appendCalcChar(current, value) {
    var s = String(current || "");
    if (CALC_OPERATORS.indexOf(value) !== -1 && s.length) {
      var last = s.charAt(s.length - 1);
      if (CALC_OPERATORS.indexOf(last) !== -1) return s.slice(0, -1) + value;
    }
    return s + value;
  }
  function toggleSign(expr) {
    var s = String(expr || "");
    var m = s.match(/(-?\d+\.?\d*)$/);
    if (!m || !m[1]) return s;
    var num = m[1];
    var start = s.length - num.length;
    var toggled = num.charAt(0) === "-" ? num.slice(1) : "-" + num;
    return s.slice(0, start) + toggled;
  }
  // smart "()" key — like Samsung Calculator: figures out whether the next tap should
  // open a new group or close the current one, based on what's already been typed.
  function smartParenChar(expr) {
    var s = String(expr || "");
    var opens = (s.match(/\(/g) || []).length;
    var closes = (s.match(/\)/g) || []).length;
    var last = s.length ? s.charAt(s.length - 1) : "";
    var justFinishedAValue = /[0-9)%]/.test(last);
    if (opens > closes && justFinishedAValue) return ")";
    return "(";
  }
  function esc(str) {
    var d = document.createElement("div");
    d.textContent = str == null ? "" : String(str);
    return d.innerHTML;
  }
  function timeAgo(ts) {
    if (!ts || !ts.toDate) return "";
    var d = ts.toDate();
    var diff = Math.floor((Date.now() - d.getTime()) / 1000);
    if (diff < 60) return "الآن";
    if (diff < 3600) return Math.floor(diff / 60) + " د";
    if (diff < 86400) return Math.floor(diff / 3600) + " سا";
    return d.toLocaleDateString("ar-MA", { day: "numeric", month: "short" });
  }
  function fieldValue(p, field) {
    if (state.keypadTarget && state.keypadTarget.type === "product" &&
        state.keypadTarget.id === p.id && state.keypadTarget.field === field) {
      return state.kpBuffer;
    }
    return p[field];
  }
  function commitProductField(target, buffer) {
    if (state.isReadOnly) return;
    var result = evaluateExpr(buffer);
    var newVal;
    if (result !== null) newVal = String(result);
    else if (buffer.trim() === "") newVal = "";
    else newVal = buffer;
    var patch = {};
    patch[target.field] = newVal;
    db.from("products").update(patch).eq("id", target.id).then(function (r) { if (r.error) console.error(r.error); });
  }

  // ---------- render ----------
  var root = document.getElementById("app");
  var keypadWasOpen = false;
  var lastScrolledTargetKey = null;

  // ---------- drag to reorder products (press & hold a card, then move it) ----------
  var dragCtx = null;
  var reorderSuppressed = false;

  function scrollFieldAboveKeypad(el) {
    if (!el) return;
    requestAnimationFrame(function () {
      try {
        el.scrollIntoView({ behavior: "smooth", block: "nearest" });
      } catch (e) {}
    });
  }

  function render() {
    if (state.authState !== "in") {
      renderAuth();
      return;
    }
    if (state.notesOpen) {
      renderNotes();
      return;
    }
    if (state.historyPageOpen) {
      renderHistoryPage();
      return;
    }
    if (state.adminOpen) {
      renderAdminPanel();
      return;
    }

    var html = "";

    if (state.activeView === "calc" && !state.isReadOnly && !state.keypadTarget) {
      state.keypadTarget = { type: "calc" };
    }

    html += '<div class="header" id="pageHeader">';
    html += '  <div class="header-row">';
    html += '    <div><h1>حساب الصالة</h1><p class="sub">صالة الحديد &middot; ' + esc(state.myName) + '</p></div>';
    html += '    <div class="header-actions">';
    html += '      <button id="notesBtn" class="icon-btn ghost" aria-label="الملاحظات">' + icon("note", 20, 2) + (state.hasUnreadNotes ? '<span class="notif-dot"></span>' : '') + '</button>';
    if (!state.isReadOnly && state.activeView === "products") {
      html += '      <button id="addToggleBtn" class="add-btn" aria-label="زيد منتج">' + icon(state.adding ? "x" : "plus", 22, 2.5) + '</button>';
    }
    html += '      <button id="workersToggleBtn" class="icon-btn ghost' + (state.workerTabsOpen ? " active-toggle" : "") + '" aria-label="الخدامين">' + icon("users", 18, 2) + '</button>';
    if (state.myRole === "admin") {
      html += '      <button id="adminOpenBtn" class="icon-btn ghost" aria-label="إدارة الخدامين">' + icon("lock", 16, 2) + '</button>';
    }
    html += '      <button id="logoutBtn" class="icon-btn ghost" aria-label="خروج">' + icon("logout", 18, 2) + '</button>';
    html += '    </div>';
    html += '  </div>';

    // main view switcher: calculator / products
    html += '  <div class="view-tabs">';
    html += '    <button class="view-tab' + (state.activeView === "calc" ? " active" : "") + '" data-view="calc">' + icon("calc", 16, 2.5) + ' الحاسبة</button>';
    html += '    <button class="view-tab' + (state.activeView === "products" ? " active" : "") + '" data-view="products">' + icon("box", 16, 2.5) + ' المنتجات</button>';
    html += '  </div>';

    // worker tabs (collapsible)
    if (state.workerTabsOpen) {
      html += '  <div class="worker-tabs slide-up">';
      state.workers.filter(function (w) { return w.active || w.name === state.myName; }).forEach(function (w) {
        var available = w.name === state.myName || !!state.directory[w.name];
        var active = w.name === state.viewingName;
        html += '<button class="worker-tab' + (active ? " active" : "") + (available ? "" : " disabled") + '" data-worker-tab="' + esc(w.name) + '"' + (available ? "" : " disabled") + '>' + esc(w.name) + '</button>';
      });
      html += '  </div>';
    }

    if (!state.isReadOnly && state.activeView === "products") {
      html += '  <div class="add-row slide-up' + (state.adding ? " open" : "") + '">';
      html += '    <input id="newNameInput" type="text" placeholder="سمّي المنتج..." value="' + esc(state.newName) + '" />';
      html += '    <button id="confirmAddBtn" class="confirm-btn">' + icon("check", 20, 2.5) + '</button>';
      html += '  </div>';
    }
    html += '</div>';

    if (state.isReadOnly) {
      html += '<div class="ro-banner">' + icon("lock", 14) + ' وضع العرض فقط &mdash; بيانات ديال ' + esc(state.viewingName) + '</div>';
    }

    var calcPadInline = false;
    if (state.activeView === "products") {
      // product list
      html += '<div class="list">';
      if (state.products.length === 0) {
        html += '<div class="empty">';
        html += '  <div class="empty-circle">' + icon("plus", 22) + '</div>';
        html += '  <p class="title">مازال ما كاين حتى منتج</p>';
        html += '  <p class="sub">' + (state.isReadOnly ? "هاد الخدام مازال ما زاد حتى منتج" : "اضغط على + باش تزيد أول سلعة") + '</p>';
        html += '</div>';
      } else {
        state.products.forEach(function (p) { html += renderCard(p); });
      }
      html += '</div>';
    } else {
      if (!state.isReadOnly) {
        // calculator — display + keypad merged into a single seamless card (Samsung style)
        html += '<div class="calc-wrap">';
        html += '  <div class="calc-box calc-box-merged">';
        html += '    <div class="calc-top">';
        html += '      <span>الحاسبة</span>';
        html += '    </div>';
        html += '    <div class="calc-row">';
        html += '      <textarea id="calcInput" rows="1" inputmode="none" autocomplete="off" spellcheck="false" class="mono calc-expr" placeholder="5×5 + 3...">' + esc(state.calcExpr) + '</textarea>';
        html += '    </div>';
        html += '    <div class="calc-display mono ' + (state.calcJustEqualed ? "final" : "preview") + '">' + esc(liveCalcDisplay()) + '</div>';
        html += '    <div class="calc-tools-row">';
        html += '      <button id="calcBackBtn" class="calc-back-mini" aria-label="مسح خانة">' + icon("delete", 16, 2) + '</button>';
        html += '      <button id="histToggleBtn" class="hist-toggle">' + icon("history", 13) + ' السجل</button>';
        html += '    </div>';
        html += '    <div class="calc-pad-divider"></div>';
        html += renderCalcPadGrid();
        html += '  </div>';
        html += '</div>';
        calcPadInline = true;
      } else {
        // read-only: whole page is the history
        html += '<div class="calc-page">';
        html += '<div class="history open">';
        html += '  <div class="history-top">';
        html += '    <span>سجل حسابات ' + esc(state.viewingName) + '</span>';
        html += '  </div>';
        if (state.history.length === 0) {
          html += '  <p class="history-empty">لا يوجد حساب بعد</p>';
        } else {
          state.history.forEach(function (h) {
            html += '<button class="history-item" data-hist-id="' + h.id + '">';
            html += '  <span class="expr mono">' + esc(h.expr) + '</span>';
            html += '  <span class="res mono">= ' + esc(formatNumber(h.result)) + '</span>';
            html += '</button>';
          });
        }
        html += '</div>';
        html += '</div>';
      }
    }

    if (state.keypadTarget && !calcPadInline) html += renderKeypad(!keypadWasOpen);
    keypadWasOpen = !!state.keypadTarget;

    // preserve scroll position of the scrollable list/calc area across re-renders —
    // otherwise every keystroke rebuilds the DOM from scratch and the list snaps
    // back to the top, hiding whatever field the user is typing into.
    var prevScrollEl = root.querySelector(".list, .calc-page, .calc-wrap");
    var prevScrollTop = prevScrollEl ? prevScrollEl.scrollTop : null;

    root.innerHTML = html;

    if (prevScrollTop !== null) {
      var newScrollEl = root.querySelector(".list, .calc-page, .calc-wrap");
      if (newScrollEl) newScrollEl.scrollTop = prevScrollTop;
    }

    attachEvents();
    afterRenderKeypadFocus();
  }

  function afterRenderKeypadFocus() {
    if (!state.keypadTarget) {
      lastScrolledTargetKey = null;
      return;
    }
    var targetKey = state.keypadTarget.type + ":" + (state.keypadTarget.id || "") + ":" + (state.keypadTarget.field || "");
    var shouldScroll = targetKey !== lastScrolledTargetKey;
    lastScrolledTargetKey = targetKey;

    if (state.keypadTarget.type === "calc") {
      var ci = document.getElementById("calcInput");
      if (ci) {
        try {
          ci.focus({ preventScroll: true });
          var vlen = ci.value.length;
          ci.setSelectionRange(vlen, vlen);
        } catch (e) {}
      }
    } else if (state.keypadTarget.type === "product") {
      var sel = document.querySelector('.value-field[data-id="' + state.keypadTarget.id + '"][data-field="' + state.keypadTarget.field + '"]');
      if (sel) {
        try {
          sel.focus({ preventScroll: true });
          var vlen2 = sel.value.length;
          sel.setSelectionRange(vlen2, vlen2);
        } catch (e) {}
        if (shouldScroll) scrollFieldAboveKeypad(sel.closest(".card") || sel);
      }
    }
  }

  // ---------- auth screen ----------
  function renderAuth() {
    var html = "";
    if (state.authState === "loading") {
      html += '<div class="auth-loading">جاري التحميل...</div>';
      root.innerHTML = html;
      return;
    }
    html += '<div class="auth-wrap">';
    html += '  <div class="auth-box">';
    html += '    <h1>حساب الصالة</h1>';
    html += '    <p class="sub">دخول صالة الحديد</p>';
    html += '    <div class="auth-field">';
    html += '      <label>الإيميل</label>';
    html += '      <input id="loginEmailInput" type="email" placeholder="name@hasbatsalla.app" value="' + esc(state.loginEmail) + '" autocomplete="username" />';
    html += '    </div>';
    html += '    <div class="auth-field">';
    html += '      <label>كلمة السر</label>';
    html += '      <input id="loginPasswordInput" type="password" placeholder="••••••" value="' + esc(state.loginPassword) + '" autocomplete="current-password" />';
    html += '    </div>';
    html += '    <button id="loginBtn" class="auth-submit"' + (state.authBusy ? " disabled" : "") + '>' + (state.authBusy ? "جاري الدخول..." : "دخول") + '</button>';
    if (state.authError) html += '    <p class="auth-error">' + esc(state.authError) + '</p>';
    html += '  </div>';
    html += '</div>';

  function compressImageFile(file, maxDim, quality, cb) {
    var img = new Image();
    var reader = new FileReader();
    reader.onload = function (e) {
      img.onload = function () {
        var w = img.width, h = img.height;
        var scale = Math.min(1, maxDim / Math.max(w, h));
        var cw = Math.max(1, Math.round(w * scale));
        var ch = Math.max(1, Math.round(h * scale));
        var canvas = document.createElement("canvas");
        canvas.width = cw; canvas.height = ch;
        var ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, cw, ch);
        canvas.toBlob(function (blob) { cb(blob); }, "image/jpeg", quality);
      };
      img.onerror = function () { cb(null); };
      img.src = e.target.result;
    };
    reader.onerror = function () { cb(null); };
    reader.readAsDataURL(file);
  }

  function uploadNotePhoto(file) {
    if (!supabaseClient) { alert("خدمة الصور غير متوفرة حاليا"); return; }
    state.notePhotoUploading = true;
    render();
    compressImageFile(file, 1000, 0.65, function (blob) {
      if (!blob) {
        state.notePhotoUploading = false;
        alert("تعذر قراءة الصورة");
        render();
        return;
      }
      var fileName = "note_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8) + ".jpg";
      supabaseClient.storage.from(SUPABASE_BUCKET).upload(fileName, blob, { contentType: "image/jpeg" })
        .then(function (result) {
          if (result.error) throw result.error;
          var pub = supabaseClient.storage.from(SUPABASE_BUCKET).getPublicUrl(fileName);
          state.notePhotoUrl = pub.data.publicUrl;
          state.notePhotoUploading = false;
          render();
        })
        .catch(function (err) {
          console.error(err);
          state.notePhotoUploading = false;
          alert("تعذر رفع الصورة، حاول مرة أخرى");
          render();
        });
    });
  }

  function deleteNote(id) {
    var note = state.notes.find(function (n) { return n.id === id; });
    db.from("shared_notes").delete().eq("id", id).then(function (r) { if (r.error) console.error(r.error); });
    if (note && note.photo_url) {
      try {
        var marker = "/" + SUPABASE_BUCKET + "/";
        var idx = note.photo_url.indexOf(marker);
        if (idx !== -1) {
          var fileName = note.photo_url.slice(idx + marker.length).split("?")[0];
          supabaseClient.storage.from(SUPABASE_BUCKET).remove([fileName]).then(function (r) { if (r.error) console.error(r.error); });
        }
      } catch (e) { console.error(e); }
    }
  }

  function sendNote() {
    var text = state.noteDraft.trim();
    var photoUrl = state.notePhotoUrl;
    if (!text && !photoUrl) return;
    state.noteDraft = "";
    state.notePhotoUrl = null;
    var noteData = {
      text: text,
      author_id: state.myUid,
      author_name: state.myName
    };
    if (photoUrl) noteData.photo_url = photoUrl;
    db.from("shared_notes").insert(noteData).then(function (r) { if (r.error) console.error(r.error); });
    render();
  }

    return { id: row.id, text: row.text, author: row.author_name, photoUrl: row.photo_url, done: row.done, createdAt: row.created_at };

  function loadNotes() {
    return db.from("shared_notes").select("*").order("created_at", { ascending: false }).limit(200).then(function (res) {
      if (res.error) { console.error(res.error); return; }
      state.notes = res.data.map(notesRowToState);
      if (!state.notesOpen) {
        var lastSeen = getNotesLastSeen();
        var unread = state.notes.some(function (n) {
          return n.author !== state.myName && n.createdAt && new Date(n.createdAt).getTime() > lastSeen;
        });
        state.hasUnreadNotes = unread;
      }
      render();
    });
  }

  function subscribeNotes() {
    if (unsubNotes) { unsubNotes.unsubscribe(); unsubNotes = null; }
    loadNotes();
    unsubNotes = db.channel("shared_notes_changes")
      .on("postgres_changes", { event: "*", schema: "public", table: "shared_notes" }, function () { loadNotes(); })
      .subscribe();
  }

  function getCalcPadKeys() {
    return [
      { label: "AC", cls: "kp-clear", action: "clear" },
      { label: "()", cls: "kp-fn", action: "paren" },
      { label: "%", cls: "kp-fn", action: "char", value: "%" },
      { label: "÷", cls: "kp-op", action: "char", value: "÷" },

      { label: "7", cls: "kp-digit", action: "char", value: "7" },
      { label: "8", cls: "kp-digit", action: "char", value: "8" },
      { label: "9", cls: "kp-digit", action: "char", value: "9" },
      { label: "×", cls: "kp-op", action: "char", value: "×" },

      { label: "4", cls: "kp-digit", action: "char", value: "4" },
      { label: "5", cls: "kp-digit", action: "char", value: "5" },
      { label: "6", cls: "kp-digit", action: "char", value: "6" },
      { label: "−", cls: "kp-op", action: "char", value: "-" },

      { label: "1", cls: "kp-digit", action: "char", value: "1" },
      { label: "2", cls: "kp-digit", action: "char", value: "2" },
      { label: "3", cls: "kp-digit", action: "char", value: "3" },
      { label: "+", cls: "kp-op", action: "char", value: "+" },

      { label: "+/−", cls: "kp-sign", action: "negate" },
      { label: "0", cls: "kp-digit", action: "char", value: "0" },
      { label: ".", cls: "kp-digit", action: "char", value: "." },
      { label: "=", cls: "kp-equals", action: "equals" },
    ];
  }
  function renderCalcPadGrid() {
    var h = '<div class="keypad-grid">';
    getCalcPadKeys().forEach(function (k) {
      h += '<button type="button" class="kp-btn ' + k.cls + '" data-kp-action="' + k.action + '" data-kp-value="' + (k.value ? esc(k.value) : "") + '">' + k.label + '</button>';
    });
    h += '</div>';
    return h;
  }
  function renderKeypad(animateIn) {
    var h = '<div class="keypad-wrap' + (animateIn ? " slide-up" : "") + '">';
    h += '  <div class="keypad-box">';
    h += '    <div class="keypad-top">';
    h += '      <span>لوحة الأرقام</span>';
    h += '      <div class="keypad-top-actions">';
    h += '        <button id="keypadBackBtn" class="keypad-back" aria-label="مسح خانة">' + icon("delete", 17, 2) + '</button>';
    h += '        <button id="keypadDoneBtn" class="keypad-done">' + icon("check", 13) + ' تم</button>';
    h += '      </div>';
    h += '    </div>';
    h += renderCalcPadGrid();
    h += '  </div>';
    h += '</div>';
    return h;
  }

  function renderCard(p) {
    var biroVal = evaluateExpr(fieldValue(p, "biro"));
    var makhzanVal = evaluateExpr(fieldValue(p, "makhzan"));
    var sum = (biroVal !== null ? biroVal : 0) + (makhzanVal !== null ? makhzanVal : 0);
    var hasAny = biroVal !== null || makhzanVal !== null;
    var h = '<div class="card card-row" data-product-id="' + p.id + '">';
    h += '  <span class="rivet r"></span><span class="rivet l"></span>';
    h += '  <div class="card-name">';
    h += '    <h3>' + esc(p.name) + '</h3>';
    if (hasAny) {
      h += '    <span class="card-sum-mini mono">مجموع ' + esc(formatNumber(sum)) + '</span>';
    }
    h += '  </div>';
    h += '  <div class="mini-field"><div class="field-label">بيرو</div><input class="value-field' + (fieldValue(p, "biro") ? " filled" : "") + (state.isReadOnly ? " ro" : "") + ' mono" inputmode="none" autocomplete="off" data-field="biro" data-id="' + p.id + '" value="' + esc(fieldValue(p, "biro")) + '" placeholder="0"' + (state.isReadOnly ? " readonly" : "") + ' /></div>';
    h += '  <div class="mini-field"><div class="field-label">مخزن</div><input class="value-field' + (fieldValue(p, "makhzan") ? " filled" : "") + (state.isReadOnly ? " ro" : "") + ' mono" inputmode="none" autocomplete="off" data-field="makhzan" data-id="' + p.id + '" value="' + esc(fieldValue(p, "makhzan")) + '" placeholder="0"' + (state.isReadOnly ? " readonly" : "") + ' /></div>';
    if (!state.isReadOnly) {
      if (state.confirmDeleteId === p.id) {
        h += '  <div class="confirm-del">';
        h += '    <button class="yes" data-del-confirm="' + p.id + '">' + icon("check", 13) + '</button>';
        h += '    <button class="no" data-del-cancel="' + p.id + '">' + icon("x", 13) + '</button>';
        h += '  </div>';
      } else {
        h += '  <button class="del-btn" data-del-ask="' + p.id + '" aria-label="حذف المنتج">' + icon("trash", 15) + '</button>';
      }
    }
    h += '</div>';
    return h;
  }

  // ---------- events ----------
  function attachEvents() {
    var notesBtn = document.getElementById("notesBtn");
    if (notesBtn) notesBtn.onclick = function () { state.notesOpen = true; markNotesSeen(); render(); };

    var logoutBtn = document.getElementById("logoutBtn");
    if (logoutBtn) logoutBtn.onclick = doLogout;

    var workersToggleBtn = document.getElementById("workersToggleBtn");
    if (workersToggleBtn) workersToggleBtn.onclick = function () { state.workerTabsOpen = !state.workerTabsOpen; render(); };

    var adminOpenBtn = document.getElementById("adminOpenBtn");
    if (adminOpenBtn) adminOpenBtn.onclick = function () { state.adminOpen = true; render(); };

    document.querySelectorAll("[data-view]").forEach(function (btn) {
      btn.onclick = function () {
        var v = btn.getAttribute("data-view");
        if (v === state.activeView) return;
        state.activeView = v;
        state.keypadTarget = null;
        state.kpBuffer = "";
        state.adding = false;
        render();
      };
    });

    document.querySelectorAll("[data-worker-tab]").forEach(function (btn) {
      btn.onclick = function () {
        var name = btn.getAttribute("data-worker-tab");
        switchViewing(name);
      };
    });

    var addToggleBtn = document.getElementById("addToggleBtn");
    if (addToggleBtn) addToggleBtn.onclick = function () {
      state.adding = !state.adding;
      if (!state.adding) state.newName = "";
      render();
      if (state.adding) {
        var inp = document.getElementById("newNameInput");
        if (inp) inp.focus();
      }
    };

    var newNameInput = document.getElementById("newNameInput");
    if (newNameInput) {
      newNameInput.oninput = function (e) { state.newName = e.target.value; };
      newNameInput.onkeydown = function (e) { if (e.key === "Enter") addProduct(); };
    }
    var confirmAddBtn = document.getElementById("confirmAddBtn");
    if (confirmAddBtn) confirmAddBtn.onclick = addProduct;

    document.querySelectorAll(".value-field").forEach(function (input) {
      if (state.isReadOnly) return;
      input.addEventListener("focus", function (e) {
        var id = e.target.getAttribute("data-id");
        var field = e.target.getAttribute("data-field");
        if (state.keypadTarget && state.keypadTarget.type === "product" &&
            state.keypadTarget.id === id && state.keypadTarget.field === field) {
          return;
        }
        if (state.keypadTarget && state.keypadTarget.type === "product") {
          commitProductField(state.keypadTarget, state.kpBuffer);
        }
        var p = state.products.find(function (pp) { return pp.id === id; });
        state.keypadTarget = { type: "product", id: id, field: field };
        state.kpBuffer = p ? (p[field] || "") : "";
        render();
      });
      input.addEventListener("input", function (e) {
        var id = e.target.getAttribute("data-id");
        var field = e.target.getAttribute("data-field");
        if (state.keypadTarget && state.keypadTarget.type === "product" &&
            state.keypadTarget.id === id && state.keypadTarget.field === field) {
          state.kpBuffer = e.target.value;
        }
      });
      input.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          if (state.keypadTarget && state.keypadTarget.type === "product") {
            commitProductField(state.keypadTarget, state.kpBuffer);
          }
          state.keypadTarget = null;
          state.kpBuffer = "";
          e.target.blur();
          render();
        }
      });
    });

    document.querySelectorAll("[data-del-ask]").forEach(function (btn) {
      btn.onclick = function () { state.confirmDeleteId = btn.getAttribute("data-del-ask"); render(); };
    });
    document.querySelectorAll("[data-del-cancel]").forEach(function (btn) {
      btn.onclick = function () { state.confirmDeleteId = null; render(); };
    });
    document.querySelectorAll("[data-del-confirm]").forEach(function (btn) {
      btn.onclick = function () {
        var id = btn.getAttribute("data-del-confirm");
        state.confirmDeleteId = null;
        db.from("products").delete().eq("id", id).then(function (r) { if (r.error) console.error(r.error); });
        render();
      };
    });

    var histToggleBtn = document.getElementById("histToggleBtn");
    if (histToggleBtn) histToggleBtn.onclick = function () { state.historyPageOpen = true; render(); };
    var clearHistBtn = document.getElementById("clearHistBtn");
    if (clearHistBtn) clearHistBtn.onclick = clearHistory;
    document.querySelectorAll("[data-hist-id]").forEach(function (btn) {
      btn.onclick = function () {
        var hid = btn.getAttribute("data-hist-id");
        var item = state.history.find(function (h) { return h.id === hid; });
        if (item) { state.calcExpr = String(item.result); state.calcJustEqualed = true; }
        state.historyOpen = false;
        render();
      };
    });

    var calcInput = document.getElementById("calcInput");
    fitCalcDisplay(document.querySelector(".calc-display"));
    fitExprDisplay(calcInput);
    if (calcInput) {
      calcInput.oninput = function (e) {
        state.calcExpr = e.target.value;
        state.calcJustEqualed = false;
        fitExprDisplay(calcInput);
        var disp = document.querySelector(".calc-display");
        if (disp) {
          disp.classList.remove("final");
          disp.classList.add("preview");
          disp.textContent = liveCalcDisplay();
          fitCalcDisplay(disp);
        }
      };
      calcInput.onkeydown = function (e) { if (e.key === "Enter") { e.preventDefault(); runCalc(); } };
      calcInput.onfocus = function () {
        if (state.keypadTarget && state.keypadTarget.type === "calc") return;
        if (state.keypadTarget && state.keypadTarget.type === "product") {
          commitProductField(state.keypadTarget, state.kpBuffer);
        }
        state.keypadTarget = { type: "calc" };
        render();
      };
    }
    var keypadDoneBtn = document.getElementById("keypadDoneBtn");
    if (keypadDoneBtn) keypadDoneBtn.onclick = function () { closeKeypad(); vibrateKey(); };
    var backspaceHandler = function () {
      vibrateKey(35);
      var t = state.keypadTarget;
      if (!t) return;
      if (t.type === "calc") { state.calcExpr = state.calcExpr.slice(0, -1); state.calcJustEqualed = false; }
      else if (t.type === "product") state.kpBuffer = state.kpBuffer.slice(0, -1);
      render();
    };
    var keypadBackBtn = document.getElementById("keypadBackBtn");
    if (keypadBackBtn) keypadBackBtn.onclick = backspaceHandler;
    var calcBackBtn = document.getElementById("calcBackBtn");
    if (calcBackBtn) calcBackBtn.onclick = backspaceHandler;
    document.querySelectorAll("[data-kp-action]").forEach(function (btn) {
      btn.onclick = function () {
        var actionForVibe = btn.getAttribute("data-kp-action");
        if (actionForVibe === "equals") vibrateKey(45);
        else if (actionForVibe === "clear") vibrateKey([15, 60, 15]);
        else vibrateKey(35);
        var action = btn.getAttribute("data-kp-action");
        var t = state.keypadTarget;
        if (!t) return;
        if (t.type === "calc") {
          if (action === "char") { state.calcExpr = appendCalcChar(state.calcExpr, btn.getAttribute("data-kp-value")); state.calcJustEqualed = false; }
          else if (action === "paren") { state.calcExpr += smartParenChar(state.calcExpr); state.calcJustEqualed = false; }
          else if (action === "back") { state.calcExpr = state.calcExpr.slice(0, -1); state.calcJustEqualed = false; }
          else if (action === "clear") { state.calcExpr = ""; state.calcJustEqualed = false; }
          else if (action === "negate") { state.calcExpr = toggleSign(state.calcExpr); state.calcJustEqualed = false; }
          else if (action === "equals") { runCalc(); return; }
          render();
        } else if (t.type === "product") {
          if (action === "char") state.kpBuffer = appendCalcChar(state.kpBuffer, btn.getAttribute("data-kp-value"));
          else if (action === "paren") state.kpBuffer += smartParenChar(state.kpBuffer);
          else if (action === "back") state.kpBuffer = state.kpBuffer.slice(0, -1);
          else if (action === "clear") state.kpBuffer = "";
          else if (action === "negate") state.kpBuffer = toggleSign(state.kpBuffer);
          else if (action === "equals") {
            var result = evaluateExpr(state.kpBuffer);
            if (result !== null) state.kpBuffer = String(result);
          }
          render();
        }
      };
    });
  }

  function vibrateKey(ms) {
    if (!navigator.vibrate) return;
    try {
      navigator.vibrate(ms || 35);
    } catch (e) {}
  }

  function closeKeypad() {
    if (state.keypadTarget && state.keypadTarget.type === "product") {
      commitProductField(state.keypadTarget, state.kpBuffer);
    }
    state.keypadTarget = null;
    state.kpBuffer = "";
    render();
    if (document.activeElement && typeof document.activeElement.blur === "function") {
      document.activeElement.blur();
    }
  }

  function addProduct() {
    var name = state.newName.trim();
    if (!name) { state.adding = false; render(); return; }
    state.newName = "";
    state.adding = false;
    db.from("products").insert({ owner_id: state.myUid, name: name, biro: "", makhzan: "" })
      .then(function (r) { if (r.error) console.error(r.error); });
    render();
  }

  // shrinks font-size until the (now-wrapping) text fits inside the element's fixed box height —
  // works for both the result readout and the expression trail, so a big number wraps to a new
  // line (like Samsung Calculator) instead of getting cut off.
  function fitWrapDisplay(el, maxSize, minSize) {
    if (!el) return;
    var size = maxSize;
    el.style.fontSize = size + "px";
    while (size > minSize && el.scrollHeight > el.clientHeight + 1) {
      size -= 1;
      el.style.fontSize = size + "px";
    }
  }

  function fitCalcDisplay(el) {
    if (!el) return;
    if (el.classList.contains("final")) fitWrapDisplay(el, 40, 13);
    else fitWrapDisplay(el, 20, 11);
  }

  function fitExprDisplay(el) {
    fitWrapDisplay(el, 22, 11);
  }

  function liveCalcDisplay() {
    var expr = state.calcExpr;
    if (!expr || !expr.trim()) return "0";
    var result = evaluateExpr(expr);
    if (result !== null) return formatNumberPlain(result, false);
    return "...";
  }

  function runCalc() {
    var result = evaluateExpr(state.calcExpr);
    if (result === null) return;
    var expr = state.calcExpr;
    state.calcExpr = String(result);
    state.calcJustEqualed = true;
    render();
    db.from("history").insert({ owner_id: state.myUid, expr: expr, result: result })
      .then(function (r) { if (r.error) console.error(r.error); });
  }

  function clearHistory() {
    db.from("history").delete().eq("owner_id", state.myUid)
      .then(function (r) { if (r.error) console.error(r.error); });
  }

  // ---------- switching whose data is viewed ----------
  function switchViewing(name) {
    var uid;
    if (name === state.myName) uid = state.myUid;
    else uid = state.directory[name];
    if (!uid) return; // that worker hasn't logged in yet, no data to show
    state.viewingName = name;
    state.viewingUid = uid;
    state.isReadOnly = name !== state.myName;
    state.confirmDeleteId = null;
    state.keypadTarget = null;
    state.kpBuffer = "";
    state.adding = false;
    state.historyOpen = false;
    state.workerTabsOpen = false;
    subscribeViewedData(uid);
    render();
  }

  function loadProducts(uid) {
    return db.from("products").select("*").eq("owner_id", uid).order("created_at", { ascending: false })
      .then(function (res) {
        if (res.error) { console.error(res.error); return; }
        state.products = res.data;
        render();
      });
  }
  function loadHistory(uid) {
    return db.from("history").select("*").eq("owner_id", uid).order("created_at", { ascending: false }).limit(60)
      .then(function (res) {
        if (res.error) { console.error(res.error); return; }
        state.history = res.data;
        render();
      });
  }

  function subscribeViewedData(uid) {
    if (unsubProducts) { unsubProducts.unsubscribe(); unsubProducts = null; }
    if (unsubHistory) { unsubHistory.unsubscribe(); unsubHistory = null; }
    loadProducts(uid);
    loadHistory(uid);
    unsubProducts = db.channel("products_" + uid)
      .on("postgres_changes", { event: "*", schema: "public", table: "products", filter: "owner_id=eq." + uid }, function () { if (!reorderSuppressed) loadProducts(uid); })
      .subscribe();
    unsubHistory = db.channel("history_" + uid)
      .on("postgres_changes", { event: "*", schema: "public", table: "history", filter: "owner_id=eq." + uid }, function () { loadHistory(uid); })
      .subscribe();
  }

  // ---------- لائحة الخدامين (profiles) - بديل directory/WORKERS القدام ----------
  function loadWorkers() {
    return db.from("profiles").select("id, name, role, active").order("created_at", { ascending: true })
      .then(function (res) {
        if (res.error) { console.error(res.error); return; }
        state.workers = res.data;
        var dir = {};
        res.data.forEach(function (w) { if (w.active) dir[w.name] = w.id; });
        state.directory = dir;
        render();
      });
  }

  function subscribeWorkers() {
    if (unsubDirectory) { unsubDirectory.unsubscribe(); unsubDirectory = null; }
    loadWorkers();
    unsubDirectory = db.channel("profiles_changes")
      .on("postgres_changes", { event: "*", schema: "public", table: "profiles" }, function () { loadWorkers(); })
      .subscribe();
  }

  // ---------- auth lifecycle ----------
  function teardownRealtime() {
    if (unsubProducts) { unsubProducts.unsubscribe(); unsubProducts = null; }
    if (unsubHistory) { unsubHistory.unsubscribe(); unsubHistory = null; }
    if (unsubDirectory) { unsubDirectory.unsubscribe(); unsubDirectory = null; }
    if (unsubNotes) { unsubNotes.unsubscribe(); unsubNotes = null; }
  }

  function onSignedIn(user) {
    db.from("profiles").select("name, role, active").eq("id", user.id).single().then(function (res) {
      if (res.error || !res.data) {
        console.error(res.error);
        state.authState = "out";
        state.authError = "ماكاينش profile مربوط بهاد الحساب، تواصل مع admin";
        render();
        return;
      }
      if (!res.data.active) {
        db.auth.signOut();
        state.authState = "out";
        state.authError = "هاد الحساب معطل";
        render();
        return;
      }
      state.myName = res.data.name;
      state.myRole = res.data.role;
      state.myUid = user.id;
      state.authState = "in";
      state.authBusy = false;
      state.viewingName = state.myName;
      state.viewingUid = user.id;
      state.isReadOnly = false;

      subscribeWorkers();
      subscribeViewedData(user.id);
      subscribeNotes();
      render();
    });
  }

  db.auth.onAuthStateChange(function (event, session) {
    teardownRealtime();
    if (!session || !session.user) {
      state.authState = "out";
      state.authBusy = false;
      state.myName = null;
      state.myUid = null;
      state.myRole = "worker";
      render();
      return;
    }
    onSignedIn(session.user);
  });

  // ---------- init ----------
  document.addEventListener("pointerdown", function (e) {
    if (!state.keypadTarget) return;
    if (state.activeView === "calc" && state.keypadTarget.type === "calc") return; // pinned, stays open
    var withinKeypad = e.target.closest && e.target.closest(".keypad-wrap");
    var withinField = e.target.closest && e.target.closest("#calcInput, .value-field");
    if (withinKeypad || withinField) return;
    closeKeypad();
  });

  // long-press a product card, then drag it up/down to reorder the list
  document.addEventListener("pointerdown", function (e) {
    if (state.isReadOnly || state.activeView !== "products") return;
    if (e.pointerType === "mouse" && e.button !== 0) return;
    var cardEl = e.target.closest && e.target.closest(".card-row");
    if (!cardEl) return;
    if (e.target.closest(".value-field, .del-btn, .confirm-del")) return;
    var listEl = cardEl.closest(".list");
    if (!listEl || listEl.querySelectorAll(".card-row").length < 2) return;

    var startX = e.clientX, startY = e.clientY, pointerId = e.pointerId;
    var timer = setTimeout(function () {
      cleanupPre();
      beginCardDrag(cardEl, listEl, startY, pointerId);
    }, 400);

    function cleanupPre() {
      clearTimeout(timer);
      document.removeEventListener("pointermove", onPreMove);
      document.removeEventListener("pointerup", onPreEnd);
      document.removeEventListener("pointercancel", onPreEnd);
    }
    function onPreMove(ev) {
      if (Math.abs(ev.clientX - startX) > 8 || Math.abs(ev.clientY - startY) > 8) cleanupPre();
    }
    function onPreEnd() { cleanupPre(); }

    document.addEventListener("pointermove", onPreMove);
    document.addEventListener("pointerup", onPreEnd);
    document.addEventListener("pointercancel", onPreEnd);
  });

  function beginCardDrag(cardEl, listEl, startClientY, pointerId) {
    var id = cardEl.getAttribute("data-product-id");
    var cards = Array.prototype.slice.call(listEl.querySelectorAll(".card-row"));
    var order = cards.map(function (c) { return c.getAttribute("data-product-id"); });
    var startIndex = order.indexOf(id);
    if (startIndex === -1) return;

    var rect = cardEl.getBoundingClientRect();
    var cs = window.getComputedStyle(cardEl);
    var slotHeight = rect.height + (parseFloat(cs.marginBottom) || 0);

    dragCtx = {
      id: id, el: cardEl, listEl: listEl, cards: cards, order: order,
      startIndex: startIndex, currentIndex: startIndex, liveOrder: order,
      startClientY: startClientY, slotHeight: slotHeight, pointerId: pointerId
    };

    vibrateKey(40);
    cardEl.classList.add("dragging");
    cardEl.style.transition = "none";
    cardEl.style.touchAction = "none";
    cards.forEach(function (c) { if (c !== cardEl) c.style.transition = "transform 160ms ease"; });

    try { cardEl.setPointerCapture(pointerId); } catch (err) {}
    document.addEventListener("pointermove", onCardDragMove);
    document.addEventListener("pointerup", onCardDragEnd);
    document.addEventListener("pointercancel", onCardDragEnd);
  }

  function onCardDragMove(e) {
    if (!dragCtx) return;
    e.preventDefault();
    var delta = e.clientY - dragCtx.startClientY;
    dragCtx.el.style.transform = "translateY(" + delta + "px)";

    var rawIndex = dragCtx.startIndex + Math.round(delta / dragCtx.slotHeight);
    var newIndex = Math.max(0, Math.min(dragCtx.order.length - 1, rawIndex));
    if (newIndex === dragCtx.currentIndex) return;
    dragCtx.currentIndex = newIndex;

    dragCtx.cards.forEach(function (c, idx) {
      if (c === dragCtx.el) return;
      var shift = 0;
      if (dragCtx.startIndex < newIndex) {
        if (idx > dragCtx.startIndex && idx <= newIndex) shift = -dragCtx.slotHeight;
      } else if (dragCtx.startIndex > newIndex) {
        if (idx >= newIndex && idx < dragCtx.startIndex) shift = dragCtx.slotHeight;
      }
      c.style.transform = shift ? "translateY(" + shift + "px)" : "";
    });

    var newOrder = dragCtx.order.slice();
    newOrder.splice(dragCtx.startIndex, 1);
    newOrder.splice(newIndex, 0, dragCtx.id);
    dragCtx.liveOrder = newOrder;
  }

  function onCardDragEnd() {
    if (!dragCtx) return;
    document.removeEventListener("pointermove", onCardDragMove);
    document.removeEventListener("pointerup", onCardDragEnd);
    document.removeEventListener("pointercancel", onCardDragEnd);

    var finalOrder = dragCtx.liveOrder;
    var el = dragCtx.el, cards = dragCtx.cards;
    el.classList.remove("dragging");
    el.style.transform = ""; el.style.transition = ""; el.style.touchAction = "";
    cards.forEach(function (c) { c.style.transform = ""; c.style.transition = ""; });

    commitProductOrder(finalOrder);
    dragCtx = null;
  }

  function commitProductOrder(orderIds) {
    if (!orderIds || orderIds.length < 2) return;
    var byId = {};
    state.products.forEach(function (p) { byId[p.id] = p; });
    var reordered = orderIds.map(function (id) { return byId[id]; }).filter(Boolean);
    if (reordered.length !== state.products.length) return;

    state.products = reordered;
    render();

    reorderSuppressed = true;
    var base = Date.now();
    var uid = state.viewingUid;
    Promise.all(reordered.map(function (p, i) {
      var ts = new Date(base - i * 1000).toISOString();
      return db.from("products").update({ created_at: ts }).eq("id", p.id);
    })).then(function (results) {
      results.forEach(function (r) { if (r && r.error) console.error(r.error); });
    }).catch(function (err) {
      console.error(err);
    }).then(function () {
      reorderSuppressed = false;
      if (uid) loadProducts(uid);
    });
  }

  render();
})();
</script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").then(function (reg) {
        console.log("SW registered:", reg.scope);
        if (reg.update) reg.update();
      }).catch(function (err) {
        console.error("SW registration failed:", err);
      });
    });
    var swRefreshing = false;
    navigator.serviceWorker.addEventListener("controllerchange", function () {
      if (swRefreshing) return;
      swRefreshing = true;
      window.location.reload();
    });
  }
</script>
</body>
</html>
